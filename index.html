<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Formicarium</title>
    <meta name="description" content="Emergent 2D ant nest simulation. Stigmergy, contact-based agitation, and chamber widening produce a living cross-section nest." />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='5' fill='%23161922'/%3E%3Crect y='5' width='16' height='11' fill='%236b4f33'/%3E%3Ccircle cx='8' cy='10' r='1.4' fill='%231a1a1a'/%3E%3C/svg%3E" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0c10; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; color: #d6d8de; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      #overlay {
        position: fixed; top: 8px; left: 8px;
        background: rgba(10, 12, 16, 0.7);
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 11px;
        line-height: 1.4;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre;
        pointer-events: none;
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255,255,255,0.06);
      }
      #overlay.hidden { display: none; }
      #help {
        position: fixed; bottom: 8px; right: 8px;
        background: rgba(10, 12, 16, 0.6);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 10px;
        opacity: 0.5;
        pointer-events: none;
      }
      #help.hidden { display: none; }
      #antinfo {
        position: fixed; top: 12px; right: 12px;
        background: rgba(10, 12, 16, 0.82);
        color: #e2e4ea;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.5;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        min-width: 200px;
        max-width: 280px;
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 240, 120, 0.35);
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.35);
      }
      #antinfo.hidden { display: none; }
      #antinfo .name { font-size: 15px; font-weight: 600; color: #fff4a8; margin-bottom: 2px; }
      #antinfo .id { font-size: 10px; color: #8c909a; font-family: ui-monospace, monospace; margin-bottom: 6px; }
      #antinfo .row { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; }
      #antinfo .row .label { color: #9ea2ac; }
      #antinfo .row .value { color: #e2e4ea; }
      #antinfo .close { position: absolute; top: 4px; right: 6px; cursor: pointer; color: #6a6e78; font-size: 16px; line-height: 1; padding: 2px; }
      #antinfo .close:hover { color: #e2e4ea; }
      #speed {
        position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
        background: rgba(10, 12, 16, 0.78);
        padding: 6px 8px;
        border-radius: 8px;
        font-size: 12px;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex; gap: 4px; align-items: center;
        user-select: none;
      }
      #speed button {
        background: transparent;
        color: #cfd2d8;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 5px;
        padding: 4px 10px;
        font-size: 12px;
        font-family: ui-monospace, monospace;
        cursor: pointer;
        transition: background 0.1s, border-color 0.1s;
      }
      #speed button:hover { background: rgba(255, 255, 255, 0.08); }
      #speed button.active {
        background: rgba(255, 240, 120, 0.2);
        border-color: rgba(255, 240, 120, 0.5);
        color: #fff4a8;
      }
      noscript { padding: 24px; display: block; }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="screen"></canvas>
      <div id="overlay" class="hidden"></div>
      <div id="antinfo" class="hidden"></div>
      <div id="speed">
        <span style="opacity:0.6;margin-right:4px">speed</span>
        <button data-speed="1">1×</button>
        <button data-speed="2">2×</button>
        <button data-speed="4">4×</button>
        <button data-speed="8">8×</button>
        <button data-speed="16">16×</button>
        <button data-speed="32">32×</button>
      </div>
      <div id="help">tap an ant for info</div>
    </div>
    <noscript>Formicarium requires JavaScript.</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
