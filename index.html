<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Formicarium</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0606; overflow: hidden; }
      body { font-family: ui-sans-serif, system-ui, sans-serif; color: #d8c8a8; }
      canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; image-rendering: crisp-edges; touch-action: none; }
      html, body { touch-action: none; overscroll-behavior: none; }
      #hud {
        position: fixed; top: 8px; left: 8px;
        font-size: 12px; line-height: 1.4; opacity: 0.7;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
      }
      #help {
        position: fixed; right: 12px; bottom: 12px;
        background: rgba(10, 6, 6, 0.78);
        border: 1px solid rgba(216, 200, 168, 0.18);
        border-radius: 6px; padding: 10px 14px;
        font-size: 12px; line-height: 1.5;
        text-shadow: 0 1px 1px #000;
        max-width: 240px;
        transition: opacity 200ms ease;
        pointer-events: none;
      }
      #help.hidden { opacity: 0; }
      #help kbd {
        font-family: ui-monospace, monospace;
        font-size: 11px;
        background: rgba(216, 200, 168, 0.12);
        border: 1px solid rgba(216, 200, 168, 0.3);
        border-radius: 3px;
        padding: 0 4px;
        color: #f0e2c4;
      }
      #help h1 {
        margin: 0 0 6px 0; font-size: 12px; font-weight: 600;
        color: #f0e2c4; letter-spacing: 0.04em;
      }
      /* On-screen control cluster — visible on every platform but
         essential on mobile where keyboard input is unavailable.
         Each button mirrors a keyboard binding 1:1. Stays out of the
         way (small, translucent) until tapped. */
      #ctrls {
        position: fixed; left: 50%; bottom: 12px;
        transform: translateX(-50%);
        display: flex; flex-wrap: wrap; gap: 6px;
        padding: 8px;
        background: rgba(10, 6, 6, 0.62);
        border: 1px solid rgba(216, 200, 168, 0.18);
        border-radius: 8px;
        opacity: 0.55;
        transition: opacity 200ms ease;
        z-index: 10;
        max-width: calc(100vw - 24px);
      }
      #ctrls:hover, #ctrls:focus-within { opacity: 1; }
      #ctrls.hidden { opacity: 0; pointer-events: none; }
      #ctrls button {
        appearance: none;
        background: rgba(216, 200, 168, 0.10);
        border: 1px solid rgba(216, 200, 168, 0.28);
        border-radius: 6px;
        color: #f0e2c4;
        font: 600 13px ui-sans-serif, system-ui, sans-serif;
        padding: 8px 12px;
        min-width: 44px;
        min-height: 44px;
        line-height: 1;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      #ctrls button:active { background: rgba(216, 200, 168, 0.25); }
    </style>
  </head>
  <body>
    <canvas id="screen"></canvas>
    <div id="hud"></div>
    <div id="ctrls" role="toolbar" aria-label="simulation controls">
      <button data-act="pause" title="pause / resume (space)">⏯</button>
      <button data-act="slower" title="slower (-)">−</button>
      <button data-act="faster" title="faster (+)">+</button>
      <button data-act="zoomout" title="reset zoom (0)">⌖</button>
      <button data-act="phero" title="pheromone overlay (p)">𝜙</button>
      <button data-act="reseed" title="reseed (r)">↻</button>
      <button data-act="full" title="fullscreen (f)">⛶</button>
      <button data-act="help" title="help (?)">?</button>
    </div>
    <div id="help">
      <h1>FORMICARIUM</h1>
      <div><kbd>space</kbd> pause / resume</div>
      <div><kbd>+</kbd> / <kbd>-</kbd> faster / slower</div>
      <div><kbd>r</kbd> reseed and rebuild</div>
      <div><kbd>f</kbd> fullscreen</div>
      <div>pinch / wheel to zoom, drag to pan</div>
      <div><kbd>0</kbd> reset zoom</div>
      <div><kbd>p</kbd> toggle pheromone overlay</div>
      <div><kbd>?</kbd> hide / show this panel</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
